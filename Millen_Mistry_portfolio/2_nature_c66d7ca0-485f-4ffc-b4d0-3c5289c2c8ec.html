<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenWalk - Nature Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            margin: 0;
            overflow: hidden;
        }

        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background-color: #050805;
        }

        .garden-layer {
            width: 130%; 
            height: 130%;
            object-fit: cover;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: brightness(0.6) contrast(1.1) saturate(0.9);
            transition: opacity 3s ease-in-out;
            opacity: 0;
        }

        .active-layer {
            opacity: 1;
        }

        .walking-motion {
            animation: forwardDrift 15s infinite linear, headBob 4s infinite ease-in-out;
        }

        @keyframes forwardDrift {
            0% { transform: translate(-50%, -50%) scale(1.0); }
            100% { transform: translate(-51%, -51%) scale(1.15); }
        }

        @keyframes headBob {
            0%, 100% { margin-top: 0; }
            50% { margin-top: -10px; } 
        }

        .box-container {
            width: 280px;
            height: 280px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            backdrop-filter: blur(2px);
            border-radius: 12px;
        }

        .breath-indicator {
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: -9px;
            left: -9px;
            box-shadow: 0 0 25px #fff, 0 0 50px rgba(255,255,255,0.4);
            transition: all 4000ms linear;
            z-index: 20;
        }

        .overlay-content {
            position: relative;
            background: radial-gradient(circle, rgba(0,0,0,0) 10%, rgba(0,0,0,0.6) 100%);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
            pointer-events: none;
        }

        #ui-layer {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 30;
        }

        #instruction-text {
            font-weight: 300;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-size: 1.2rem;
            height: 2.5rem;
            margin-bottom: 3rem;
            text-shadow: 0 0 20px rgba(0,0,0,0.9);
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 1.2rem 4rem;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 0.8rem;
            font-weight: 300;
            color: white;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            backdrop-filter: blur(16px);
            margin-top: 1rem;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 1);
            color: #000;
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border-color: white;
        }
    </style>
</head>
<body>

    <div id="bg-container">
        <!-- We use two layers for smooth cross-fading -->
        <img id="bg-1" class="garden-layer walking-motion" src="" alt="">
        <img id="bg-2" class="garden-layer walking-motion" src="" alt="">
    </div>

    <div class="overlay-content">
        <div id="ui-layer">
            
            <div id="instruction-text">Find Your Center</div>

            <div class="box-container mb-16">
                <div id="dot" class="breath-indicator"></div>
                <div class="absolute -top-12 left-1/2 -translate-x-1/2 opacity-40 text-[10px] tracking-[0.6em]">INHALE</div>
                <div class="absolute top-1/2 -right-20 -translate-y-1/2 rotate-90 opacity-40 text-[10px] tracking-[0.6em]">HOLD</div>
                <div class="absolute -bottom-12 left-1/2 -translate-x-1/2 opacity-40 text-[10px] tracking-[0.6em]">EXHALE</div>
                <div class="absolute top-1/2 -left-20 -translate-y-1/2 -rotate-90 opacity-40 text-[10px] tracking-[0.6em]">HOLD</div>
            </div>

            <button id="toggle-btn" class="btn-action">
                Begin Walk
            </button>
        </div>
    </div>

    <script>
        const dot = document.getElementById('dot');
        const text = document.getElementById('instruction-text');
        const btn = document.getElementById('toggle-btn');
        const layers = [document.getElementById('bg-1'), document.getElementById('bg-2')];

        // A collection of serene nature path images
        const natureImages = [
            "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=2560&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=2560&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=2560&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?q=80&w=2560&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1426604966848-d7adac402bdb?q=80&w=2560&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1472214103451-9374bd1c798e?q=80&w=2560&auto=format&fit=crop"
        ];

        let active = false;
        let step = 0;
        let currentLayerIndex = 0;
        let imageIndex = 0;
        let timer = null;

        const cycle = [
            { label: 'Inhale', x: 271, y: -9 },   
            { label: 'Hold', x: 271, y: 271 },  
            { label: 'Exhale', x: -9, y: 271 }, 
            { label: 'Hold', x: -9, y: -9 }     
        ];

        // Initial image setup
        layers[0].src = natureImages[0];
        layers[0].classList.add('active-layer');
        // Preload the next one onto the hidden layer
        layers[1].src = natureImages[1];

        function rotateImages() {
            // Move to next image index
            imageIndex = (imageIndex + 1) % natureImages.length;
            
            const nextLayerIndex = (currentLayerIndex + 1) % 2;
            const currentLayer = layers[currentLayerIndex];
            const nextLayer = layers[nextLayerIndex];

            // Show the next layer
            nextLayer.classList.add('active-layer');
            currentLayer.classList.remove('active-layer');
            
            currentLayerIndex = nextLayerIndex;

            // Preload the next image in the sequence onto the now-hidden layer
            const preloadIndex = (imageIndex + 1) % natureImages.length;
            setTimeout(() => {
                layers[(nextLayerIndex + 1) % 2].src = natureImages[preloadIndex];
            }, 3000); // Wait for transition to finish before swapping src
        }

        function updateCycle() {
            if (!active) return;

            const current = cycle[step];
            text.textContent = current.label;
            
            dot.style.left = `${current.x}px`;
            dot.style.top = `${current.y}px`;

            // Trigger rotation when the dot reaches the top-left (start of Inhale)
            if (step === 0) {
                rotateImages();
            }

            step = (step + 1) % 4;
            timer = setTimeout(updateCycle, 4000);
        }

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            active = !active;
            if (active) {
                btn.textContent = "Pause Session";
                updateCycle();
            } else {
                btn.textContent = "Resume Walk";
                text.textContent = "Stillness";
                clearTimeout(timer);
            }
        });

        // Initial indicator position
        dot.style.left = `-9px`;
        dot.style.top = `-9px`;
    </script>
</body>
</html>
